templates:
  compile_time:
    location: "templates/compile-time"
    filter:
      files:
      - cppdefs.opt.j2

  run_time:
    location: "templates/run-time"
    filter:
      files:
      - marbl_in

settings:
  properties:
    n_tracers: 34
    marbl: true
  compile_time:
    _default_config_yaml: "templates/compile-time-defaults.yml"
  run_time:
    _default_config_yaml: "templates/run-time-defaults.yml"

code:
  roms:
    location: https://github.com/CWorthy-ocean/ucla-roms.git
    commit: "bc7ee7d5ffd8d18741e02daa49c6d2845a4589ca"

  marbl:
    location: https://github.com/marbl-ecosys/MARBL.git
    commit: marbl0.45.0

inputs:
  grid:
    topography_source: ETOPO5

  initial_conditions:
    source:
      name: GLORYS
      glorys_layout: regional
    bgc_source:
      name: UNIFIED
      climatology: true

  forcing:
    surface:
      - source:
          name: ERA5
        type: physics
        correct_radiation: true
        coarse_grid_mode: "never"
      - source:
          name: UNIFIED
          climatology: true
        type: bgc
        coarse_grid_mode: "never"
      - source:
          name: MBL_co2
        type: bgc
        coarse_grid_mode: "never"


      # - source:
      #     name: WOA
      #     climatology: true
      #   restoring_forces: ['sss']
      #   type: restoring
      #   coarse_grid_mode: "never"

    boundary:
      - source:
          name: GLORYS
          glorys_layout: regional
        type: physics
      - source:
          name: UNIFIED
          climatology: true
        type: bgc

    tidal:
      - source:
          name: TPXO
        ntides: 15

    river:
      - source:
          name: DAI
          climatology: false
        include_bgc: true
