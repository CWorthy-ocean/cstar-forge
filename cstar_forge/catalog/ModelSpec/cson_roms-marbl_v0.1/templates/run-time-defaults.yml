# Default configuration parameters for ROMS run-time configuration
# This file contains default values for all namelist parameters.

title:
  casename: null  # Set dynamically from blueprint

time_stepping:
  ntimes: 1200
  dt: 2160  # seconds
  ndtfast: 60
  ninfo: 1

s_coord:
  theta_s: null # Set dynamically from grid file
  theta_b: null # Set dynamically from grid file
  tcline: null  # Set dynamically from grid file

grid:
  grid_file: null  # Set dynamically from generated grid file

forcing:
  surface_forcing_path: null  # Set dynamically
  surface_forcing_bgc_path: null  # Set dynamically
  boundary_forcing_path: null  # Set dynamically
  boundary_forcing_bgc_path: null  # Set dynamically
  tidal_forcing_path: null  # Set dynamically
  river_path: null  # Set dynamically

lateral_visc:
  visc2: 0.0  # m^2/sec
  visc4: 0.0  # m^2/sec
  rho0: 1000.0

output_root_name:
  output_root_name: null

vertical_mixing:
  akv: 0.0  # m^2/sec
  # akt is a list of values, one per tracer (NT tracers)
  # Default is all zeros - will be generated in template
  akt_default: 0.0

tracer_diff2:
  # tnu2 is a list of values, one per tracer (NT tracers)
  # Default is all zeros - will be generated in template
  tnu2_default: 0.0

bottom_drag:
  rdrg: 0.0E-4  # m/s
  rdrg2: 1.0E-3
  zob: 1.0E-2  # meters
  cdb_min: 1.0E-4
  cdb_max: 1.0E-2

v_sponge:
  v_sponge: 0.0  # m^2/sec

gamma2: 1.0  # Slipperiness parameter

ubind: 0.1  # m/s, OBC binding velocity scale

initial:
  nrrec: 1
  initial_file: null  # Set dynamically from generated initial conditions file

# ---------------------------------------------------------------------------
# Sections previously in compile-time-defaults.yml (now all namelist)
# ---------------------------------------------------------------------------

param:
  LLm: 512
  MMm: 512
  N: 60
  NP_XI: 16
  NP_ETA: 16
  NSUB_X: 1
  NSUB_E: 1
  nt_passive: 0
  ntrc_bio: 32

bgc:
  wrt_his: false
  output_period_his: 86400  # 3600*24 seconds
  nrpf_his: 7
  wrt_avg: false
  output_period_avg: 86400  # 60*60*24 seconds
  nrpf_avg: 7
  wrt_his_dia: false
  output_period_his_dia: 86400  # 60*60*24 seconds
  nrpf_his_dia: 7
  wrt_avg_dia: false
  output_period_avg_dia: 60  # seconds
  nrpf_avg_dia: 1
  nbgc_flx: 2
  interp_frc: 1

blk_frc:
  interp_frc: 0
  check_bulk_frc_units: false

cdr_output:
  do_cdr: false
  do_avg: true
  monthly_averages: false
  output_period: 3600
  nrpf: 24

ocean_vars:
  wrt_file_rst: true
  output_period_rst: 86400  # 24*3600 seconds, must be a multiple of the extract file frequency
  monthly_restarts: false
  nrpf_rst: 2
  wrt_file_his: false
  output_period_his: 86400  # 24*3600 seconds
  nrpf_his: 7
  wrt_Z: true
  wrt_Ub: true
  wrt_Vb: true
  wrt_U: true
  wrt_V: true
  wrt_R: false
  wrt_O: false
  wrt_W: true
  wrt_Akv: false
  wrt_Akt: false
  wrt_Aks: false
  wrt_Hbls: false
  wrt_Hbbl: false
  wrt_file_avg: false
  output_period_avg: 604800  # 7*24*3600 seconds
  nrpf_avg: 1
  wrt_avg_Z: true
  wrt_avg_Ub: true
  wrt_avg_Vb: true
  wrt_avg_U: true
  wrt_avg_V: true
  wrt_avg_R: true
  wrt_avg_O: true
  wrt_avg_W: true
  wrt_avg_Akv: true
  wrt_avg_Akt: true
  wrt_avg_Aks: true
  wrt_avg_Hbls: true
  wrt_avg_Hbbl: true
  code_check: false

surf_flux:
  wrt_smflx: false
  wrt_stflx: false
  wrt_swflx: false
  sflx_avg: false
  output_period: 31536000  # seconds
  nrpf: 10
  sst_vname: 'sst'
  sst_tname: 'sst_time'
  sss_vname: 'sss'
  sss_tname: 'sss_time'
  interp_frc: 1

tides:
  ntides: 10
  bry_tides: true
  pot_tides: true
  ana_tides: false

river_frc:
  river_source: false
  analytical: false
  nriv: 0
  rvol_vname: 'river_volume'
  rvol_tname: 'river_time'
  rtrc_vname: 'river_tracer'
  rtrc_tname: 'river_time'

diagnostics:
  diag_avg: false
  output_period: 86400  # 24*3600 seconds
  nrpf: 7
  diag_uv: false
  diag_trc: false
  diag_pflx: true
  timescale: 86400  # 1*3600*24 seconds
  diag_prec: 'nf90_double'

tracers:
  interp_t: 1

cdr_frc:
  cdr_source: false
  cdr_file: 'cdr.nc'
  ncdr_parm: 1
  forcing_depth_profiles: false
  forcing_3d: false
  forcing_parameterized: true
  time_interpolation: false
  relocate_to_wet_pts: true
  cdr_volume: false
  cdrvol_vname: 'cdr_volume'
  cdrvol_tname: 'cdr_time'
  cdrtrc_vname: 'cdr_tracer'
  cdrtrc_tname: 'cdr_time'
  cdrflx_vname: 'cdr_trcflx'
  cdrflx_tname: 'cdr_time'
  cdr_loc_lon: 'cdr_lon'
  cdr_loc_lat: 'cdr_lat'
  cdr_loc_dep: 'cdr_dep'
  cdr_scl_hor: 'cdr_hsc'
  cdr_scl_vrt: 'cdr_vsc'
  nz_chd: 50

extract_data:
  do_extract: false
  extract_file: 'sample_edata.nc'
  nrpf: 24
  edat_prec: nf90_double
  N_chd: 90
  theta_s_chd: 5.0
  theta_b_chd: 2.0
  hc_chd: 250.0
  extract_period: 3600.0

sponge_tune:
  pflx_w_vname: 'up_west'
  pflx_w_tname: 'bry_time'
  pflx_e_vname: 'up_east'
  pflx_e_tname: 'bry_time'
  pflx_s_vname: 'vp_south'
  pflx_s_tname: 'bry_time'
  pflx_n_vname: 'vp_north'
  pflx_n_tname: 'bry_time'
  ub_tune: false
  spn_avg: true
  sp_timscale: 86400  # 24*3600 seconds
  wrt_sponge: false
  nrpf: 7
  output_period: 86400  # 24*3600 seconds

upscale_output:
  do_upscale: false
  nrpf_uscl: 48
  output_period_uscl: 3600
  uscl_prec: 'nf90_double'

# ---------------------------------------------------------------------------
# New namelist-only sections (no previous .opt file equivalent)
# ---------------------------------------------------------------------------

flux_frc:
  interp_flux_frc: true

ts_output:
  wrt_temp: false
  wrt_salt: false
  wrt_temp_dia: false
  wrt_salt_dia: false

frc_output:
  wrt_frc: false
  wrt_frc_avg: false
  output_period: 3600.0
  nrpf: 4

# calc_pflx absorbs diag_pflx and its timescale from the old diagnostics.opt
calc_pflx:
  calc_pflx: true
  timescale: 86400  # timescale for filtering pressure fluxes (s)

zslice:
  do_zslice: false
  zslice_avg: false
  wrt_T_zsl: false
  wrt_U_zsl: false
  wrt_V_zsl: false
  output_period: 1200
  nrpf: 72
  ndep: 2
  vecdep: [-2.0, -15.0]
  nt_z: 2
  trc2zsc: [1, 2]

stdout_diag:
  code_check_mode: false

random_output:
  do_random: false
  output_period: 3600
  nrpf: 10

pipe_frc:
  pipe_source: false
  p_analytical: false
  npip: 1

particles:
  floats: false
  np: 50
  extra_space_fac: 1.5
  exchange_facx: 0.1
  exchange_facy: 0.1
  exchange_facc: 0.01
  output_period: 400
  nrpf: 100
  ppm3: 1.0e-6
  pmin: 200

lin_rho_eos:
  Tcoef: 0.2    # Thermal expansion coefficient (kg/m2/K); unused if NONLIN_EOS active
  T0: 1.0       # Reference temperature (*C)
  Scoef: 0.822  # Saline contraction coefficient (kg/m3/psu)
  S0: 1.0       # Reference salinity (psu)

sss_correction:
  dSSSdt: 0.0  # SSS correction piston velocity (cm/day); requires SFLX_CORR + SALINITY

sst_correction:
  dSSTdt: 0.0  # SST correction piston velocity (cm/day); requires QCORRECTION

marbl_bgc:
  marbl_config_file: "marbl_in"
  marbl_tracers_to_write: ""
  marbl_diagnostics_to_write: ""
  marbl_timestep_ratio: 1
