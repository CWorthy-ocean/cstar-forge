name: cstar-forge-0
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  # Core install/build tooling
  - black
  - bottleneck
  - cartopy
  - click>=8.3.0
  - cmocean
  # - compilers
  - coolname
  - copernicusmarine
  - coverage
  - dask
  - dask-jobqueue
  - distributed
  - esmpy
  - ffmpeg
  - flake8
  - fakeredis<2.35
  - gcm_filters>=0.5.1
  - gcsfs
  - gdown
  - h5py
  - holoviews
  - ipykernel
  - ipywidgets
  - jupyter-book
  - jupyterlab
  - jupyter_client
  - matplotlib
  #- mpich - optional, will be installed by prompt, prefer open-mpi on linux
  - nc-time-axis
  # - netcdf-fortran - optional, will be installed by prompt
  - netcdf4
  - networkx>=3.6.1
  - numba>=0.61.2
  - numpy[version=">2,<2.3"]
  - packaging
  - pandas
  - papermill
  - pip
  - pooch
  - pop-tools
  - pre-commit==3.8.0
  - pyamg
  - pyco2sys
  - pydantic[version=">2,<3"]
  - prefect>=3.6.1
  - pytimeparse>=1.1.8
  - pytest>=7.0.0
  - pytest-asyncio>=1.3.0
  - pytest-cov>=4.0.0
  - pytest-xdist>=3.0.0
  - pyyaml>=6.0
  - python-dateutil>=2.8.2
  - python-dotenv
  - pyyaml
  - quarto
  - rasterio
  - redis-py
  - regionmask
  - rioxarray
  - rsync
  - ruff>=0.12.2
  - scipy
  - seawater
  - snakeviz
  - typer<=0.25
  - types-python-dateutil>=2.9.0
  - types-pytz>=2025.2.0
  - types-pyyaml>=6.0.12
  - types-requests>2.32.4
  - xarray[version=">=2022.6.0,<2025.8.0"]
  - xesmf
  - xgcm>=0.9.0
  - zarr
  # Ensure ROMS-Tools runtime deps resolve from conda-forge first.
  - roms-tools>=3.4.0,<4
  - pip:
    # roms-tools from GitHub: use branch (e.g. @main) or commit hash (e.g. @abc123f)
    - git+https://github.com/CWorthy-ocean/roms-tools.git@main
    # cstar-ocean from GitHub: use branch (e.g. @main) or commit hash (e.g. @abc123f)
    - git+https://github.com/CWorthy-ocean/C-Star.git@main
